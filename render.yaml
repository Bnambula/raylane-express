services:
  - type: web
    name: raylane-express
    env: static
    buildCommand: echo "Static site — no build needed"
    staticPublishPath: .
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-XSS-Protection
        value: "1; mode=block"
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /admin
        destination: /admin.html
      - type: rewrite
        source: /operator
        destination: /operator.html
      - type: rewrite
        source: /book
        destination: /book.html
      - type: rewrite
        source: /*
        destination: /index.html
