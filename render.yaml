services:
  - type: web
    name: raylane-express-pro
    env: static
    buildCommand: echo "Static site — no build step required"
    staticPublishPath: .
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-XSS-Protection
        value: "1; mode=block"
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=(self)
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /admin
        destination: /admin-pro.html
      - type: rewrite
        source: /operator
        destination: /operator-pro.html
      - type: rewrite
        source: /book
        destination: /book-pro.html
      - type: rewrite
        source: /apply
        destination: /apply.html
      - type: rewrite
        source: /*
        destination: /index.html
